services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: pfm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: personal_finance
      POSTGRES_USER: pfm_user
      POSTGRES_PASSWORD: pfm_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfm_user -d personal_finance"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (ASP.NET Core) ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend/PersonalFinanceManager.Api
      dockerfile: Dockerfile
    container_name: pfm-backend
    restart: unless-stopped
    ports:
      - "5068:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=personal_finance;Username=pfm_user;Password=pfm_password
      - Database__RecreateOnStartup=true
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Frontend (Angular + nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/personal-finance-manager-ui
      dockerfile: Dockerfile
    container_name: pfm-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:
