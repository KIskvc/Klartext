services:
  postgres:
    image: postgres:17-alpine
    container_name: pfm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: personal_finance
      POSTGRES_USER: pfm_user
      POSTGRES_PASSWORD: pfm_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfm_user -d personal_finance"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
