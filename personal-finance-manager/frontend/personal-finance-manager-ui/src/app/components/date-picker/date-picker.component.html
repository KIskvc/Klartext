<div class="dp-root" [class.open]="isOpen()" [class.dp-invalid]="invalid" [class.dp-disabled]="isDisabled()" [class.dp-upward]="openUpward()">

  <button type="button" class="dp-trigger" (click)="toggle()">
    <span class="dp-label" [class.dp-placeholder]="!hasValue">
      {{ hasValue ? displayLabel : placeholder }}
    </span>
    <svg class="dp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
  </button>

  @if (isOpen()) {
    <div class="dp-dropdown" (click)="$event.stopPropagation()">

      <div class="dp-header">
        <button type="button" class="dp-nav" (click)="prevMonth()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="dp-month-label">{{ monthLabel }}</span>
        <button type="button" class="dp-nav" (click)="nextMonth()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>

      <div class="dp-weekdays">
        @for (d of WEEKDAYS; track d) {
          <span class="dp-wd">{{ d }}</span>
        }
      </div>

      <div class="dp-grid">
        @for (day of calendarDays; track $index) {
          <button
            type="button"
            class="dp-day"
            [class.dp-day--other]="!day.isCurrentMonth"
            [class.dp-day--today]="day.isToday"
            [class.dp-day--selected]="day.isSelected"
            (click)="selectDay(day)"
          >{{ day.day }}</button>
        }
      </div>

    </div>
  }

</div>
